---
layout: default
---

<article class="post">
    <header class="post-header">
        <time class="post-date" datetime="{{ page.date | date_to_xmlschema }}">
            {{ page.date | date: "%d.%m.%Y" }}
        </time>
        {% if page.tags and page.tags != empty %}
        <div class="post-tags" aria-label="Теги">
            {% for tag in page.tags %}
            <span>{{ tag }}</span>
            {% endfor %}
        </div>
        {% endif %}
        <h1>{{ page.title }}</h1>
    </header>

    <div class="post-body">
        {{ content }}
    </div>
</article>
