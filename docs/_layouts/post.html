---
layout: default
---

<article class="post">
    <header class="post-header">
        <time class="post-date" datetime="{{ page.date | date_to_xmlschema }}">
            {{ page.date | date: "%d.%m.%Y" }}
        </time>
        <h1>{{ page.title }}</h1>
    </header>

    <div class="post-body">
        {{ content }}
    </div>

    {% if page.tags and page.tags != empty %}
    <footer class="post-tags" aria-label="Теги">
        {% for tag in page.tags %}
        <span>{{ tag }}</span>
        {% endfor %}
    </footer>
    {% endif %}
</article>
