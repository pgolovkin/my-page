<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    {% seo %}
    <link rel="icon" href="{{ "/favicon.svg" | relative_url }}" type="image/svg+xml">
    <link rel="icon" href="{{ "/assets/img/favicon-512.png" | relative_url }}" type="image/png" sizes="512x512">
    <link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: site.github.build_revision | relative_url }}">
    <!--[if lt IE 9]>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5shiv/3.7.3/html5shiv.min.js"></script>
    <![endif]-->
    {% include head-custom.html %}
</head>
<body class="layout-{{ page.layout | default: 'default' }}">
<div class="site-shell">
    <header class="site-header">
        <div>
            <a class="site-title" href="{{ "/" | relative_url }}">{{ site.title }}</a>
            <p class="site-description">{{ site.description }}</p>
        </div>

        <nav class="site-nav" aria-label="Main navigation">
            <a href="mailto:{{ site.email }}">
                <svg class="nav-icon" aria-hidden="true" viewBox="0 0 24 24" fill="none">
                    <path d="M4 6h16v12H4z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                    <path d="m4 7 8 6 8-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>Связаться</span>
            </a>
            <a href="https://t.me/whileAIworks" target="_blank" rel="noopener noreferrer">
                <svg class="nav-icon" aria-hidden="true" viewBox="0 0 24 24" fill="none">
                    <path d="M21 4 3.5 11.2c-.8.3-.8 1.4.1 1.7l4.4 1.4 1.7 5c.3.8 1.3.9 1.8.2l2.5-3.5 4.5 3.4c.7.5 1.7.1 1.8-.8L22 5.1c.1-.8-.4-1.3-1-1.1Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                    <path d="m8.2 14.1 8.3-6.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
                <span>Telegram</span>
            </a>
        </nav>

        {% if site.logo %}
        <img class="site-logo" src="{{ site.logo | relative_url }}" alt="Logo" />
        {% endif %}
    </header>

    <main class="site-content">
        {{ content }}
    </main>
</div>
<script src="{{ "/assets/js/scale.fix.js" | relative_url }}"></script>
</body>
</html>
