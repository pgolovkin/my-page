<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    {% seo %}
    <link rel="icon" href="{{ "/favicon.svg" | relative_url }}" type="image/svg+xml">
    <link rel="icon" href="{{ "/assets/img/favicon-512.png" | relative_url }}" type="image/png" sizes="512x512">
    <link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: site.github.build_revision | relative_url }}">
    <!--[if lt IE 9]>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5shiv/3.7.3/html5shiv.min.js"></script>
    <![endif]-->
    {% include head-custom.html %}
</head>
<body class="layout-{{ page.layout | default: 'default' }}">
<div class="site-shell">
    <header class="site-header">
        <div>
            <a class="site-title" href="{{ "/" | relative_url }}">{{ site.title }}</a>
            <p class="site-description">{{ site.description }}</p>
        </div>

        <nav class="site-nav" aria-label="Main navigation">
            <a href="mailto:{{ site.email }}">
                <svg class="nav-icon" aria-hidden="true" viewBox="0 0 24 24" fill="none">
                    <path d="M4 6h16v12H4z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                    <path d="m4 7 8 6 8-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>Связаться</span>
            </a>
            <a href="https://t.me/whileAIworks" target="_blank" rel="noopener noreferrer">
                <svg class="nav-icon" aria-hidden="true" viewBox="0 0 24 24" fill="none">
                    <path d="M21 4 3.5 11.2c-.8.3-.8 1.4.1 1.7l4.4 1.4 1.7 5c.3.8 1.3.9 1.8.2l2.5-3.5 4.5 3.4c.7.5 1.7.1 1.8-.8L22 5.1c.1-.8-.4-1.3-1-1.1Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                    <path d="m8.2 14.1 8.3-6.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
                <span>Telegram</span>
            </a>
            <a href="https://max.ru/id332892104705_biz" target="_blank" rel="noopener noreferrer">
                <svg class="nav-icon" aria-hidden="true" viewBox="0 0 100 100" fill="none">
                    <path fill="currentColor" fill-rule="evenodd" clip-rule="evenodd" d="M50.7571 0.261719C78.2929 0.261719 99.8857 22.5974 99.8857 50.1474C99.8857 77.6974 77.6071 99.4903 51.0214 99.4903C41.5857 99.4903 37.0143 98.1617 29.65 92.9474C29.1429 92.5903 28.45 92.6831 28.0214 93.1403C22.3571 99.1831 7.85 103.426 7.18571 95.176C7.18571 80.7903 0 71.4474 0 49.876C0 21.5546 23.2214 0.261719 50.7571 0.261719ZM51.5286 24.8117C38.4643 24.126 28.2643 33.1974 26.0143 47.3831C24.15 59.1332 27.45 73.4546 30.2786 74.176C31.4786 74.4832 34.3571 72.276 36.4571 70.2974C36.85 69.926 37.45 69.8617 37.9071 70.1474C41.1786 72.1474 44.8786 73.6474 48.9571 73.8617C62.3714 74.5617 74.2571 64.0617 74.9643 50.6474C75.6643 37.2331 64.9429 25.5046 51.5286 24.8046V24.8117Z"/>
                </svg>
                <span>MAX</span>
            </a>
        </nav>

        {% if site.logo %}
        <img class="site-logo" src="{{ site.logo | relative_url }}" alt="Logo" />
        {% endif %}
    </header>

    <main class="site-content">
        {{ content }}
    </main>
</div>
<script src="{{ "/assets/js/scale.fix.js" | relative_url }}"></script>
<script>
    document.querySelectorAll('a[href]').forEach(function (link) {
        var href = link.getAttribute('href');

        if (!href || href.startsWith('#') || href.startsWith('mailto:')) {
            return;
        }

        var url = new URL(href, window.location.href);

        if (url.origin !== window.location.origin) {
            link.setAttribute('target', '_blank');
            link.setAttribute('rel', 'noopener noreferrer');
        }
    });
</script>
</body>
</html>
